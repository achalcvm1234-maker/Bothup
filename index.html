<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase File Manager Pro</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Firebase File Manager Pro</h1>
  
  <div class="buttons">
    <label class="btn-upload">
      Upload Files
      <input type="file" id="fileInput" multiple>
    </label>
    <label class="btn-upload">
      Upload Folder
      <input type="file" id="folderInput" webkitdirectory directory multiple>
    </label>
  </div>

  <div class="drop-area" id="dropArea">Drag & Drop Files or Folder Here</div>

  <ul class="file-list" id="fileList"></ul>
</div>

<!-- External JS -->
<script src="app.js"></script>
</body>
</html>
