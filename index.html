<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase File Manager</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
  body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#6a11cb,#2575fc);}
  .container{background:#fff;border-radius:15px;padding:40px 30px;width:100%;max-width:600px;text-align:center;box-shadow:0 15px 25px rgba(0,0,0,0.2);}
  h1{margin-bottom:20px;color:#333;font-size:1.8rem;}
  input[type="file"]{display:none;}
  .buttons{display:flex;justify-content:center;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
  .btn-upload{padding:15px 25px;border-radius:10px;border:none;cursor:pointer;background:#6a11cb;color:#fff;font-size:1rem;transition:0.3s;}
  .btn-upload:hover{background:#2575fc;}
  .file-list{margin-top:20px;text-align:left;max-height:300px;overflow-y:auto;}
  .file-list li{margin-bottom:10px;padding:10px;border-radius:5px;background:#f1f1f1;word-break:break-all;display:flex;justify-content:space-between;align-items:center;}
  .file-actions button{margin-left:5px;padding:5px 10px;border:none;color:white;border-radius:5px;cursor:pointer;transition:0.3s;}
  .file-actions .download-btn{background:#6a11cb;}
  .file-actions .download-btn:hover{background:#2575fc;}
  .file-actions .delete-btn{background:#ff4b5c;}
  .file-actions .delete-btn:hover{background:#ff1f3d;}
  @media(max-width:600px){.container{padding:30px 20px;}h1{font-size:1.5rem;}}
</style>
</head>
<body>

<div class="container">
  <h1>Upload Files or Folder</h1>
  <div class="buttons">
    <label class="btn-upload">
      Upload Files
      <input type="file" id="fileInput" multiple>
    </label>
    <label class="btn-upload">
      Upload Folder
      <input type="file" id="folderInput" webkitdirectory directory multiple>
    </label>
  </div>
  <ul class="file-list" id="fileList"></ul>
</div>

<script>
  // ===== Firebase Config =====
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);

  const storage = firebase.storage();
  const firestore = firebase.firestore();

  const fileInput = document.getElementById('fileInput');
  const folderInput = document.getElementById('folderInput');
  const fileList = document.getElementById('fileList');

  // Upload files to Firebase
  async function uploadFiles(files){
    for(const file of files){
      let path = file.webkitRelativePath || file.name;
      const storageRef = storage.ref().child(path);
      await storageRef.put(file);

      // Save metadata in Firestore
      await firestore.collection('files').doc(path).set({
        name: file.name,
        path: path,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    loadFiles();
  }

  fileInput.addEventListener('change', e => uploadFiles([...e.target.files]));
  folderInput.addEventListener('change', e => uploadFiles([...e.target.files]));

  // Load files list from Firestore
  async function loadFiles(){
    fileList.innerHTML = '';
    const snapshot = await firestore.collection('files').orderBy('createdAt','asc').get();
    snapshot.forEach(doc=>{
      const file = doc.data();
      const li = document.createElement('li');
      const nameSpan = document.createElement('span');
      nameSpan.textContent = file.name;

      const actionsDiv = document.createElement('div');
      actionsDiv.classList.add('file-actions');

      const downloadBtn = document.createElement('button');
      downloadBtn.textContent = 'Download';
      downloadBtn.classList.add('download-btn');
      downloadBtn.addEventListener('click', async ()=>{
        const url = await storage.ref(file.path).getDownloadURL();
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        a.click();
      });

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.classList.add('delete-btn');
      deleteBtn.addEventListener('click', async ()=>{
        await storage.ref(file.path).delete();
        await firestore.collection('files').doc(file.path).delete();
        loadFiles();
      });

      actionsDiv.appendChild(downloadBtn);
      actionsDiv.appendChild(deleteBtn);
      li.appendChild(nameSpan);
      li.appendChild(actionsDiv);
      fileList.appendChild(li);
    });
  }

  loadFiles();
</script>

</body>
</html>// Initial load
loadFiles();

</script>
</body>
</html>
